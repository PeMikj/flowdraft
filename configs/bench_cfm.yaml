experiment_name: cfm_drafter_benchmark
environment: kaggle
output_dir: /kaggle/working/cfm_drafter_benchmark
prompt_file: /kaggle/working/dataset_prompts.jsonl

model:
  name_or_path: chiennv/Orthrus-Qwen3-1.7B
  tokenizer_name_or_path: chiennv/Orthrus-Qwen3-1.7B
  dtype: float16
  device_map: auto
  attn_implementation: null
  trust_remote_code: true

generation:
  max_new_tokens: 128
  batch_size: 1
  do_sample: false
  temperature: null
  top_p: null
  seed: 20260705
  warmup_runs: 1
  benchmark_runs: 1
  eos_token_id: null
  pad_token_id: null
  use_chat_template: true
  system_prompt: null

modes:
  - name: ar_baseline
    kind: autoregressive
    kwargs: {}
  - name: orthrus_official
    kind: orthrus
    kwargs: {}
  - name: cfm_drafter
    kind: cfm
    kwargs:
      checkpoint_path: /kaggle/working/cfm_drafter.pt
      block_size: 32
      sampling_steps: 1
      dtype: float16
