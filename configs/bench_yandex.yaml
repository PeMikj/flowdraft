experiment_name: orthrus_baseline_yandex_v1
environment: yandex
output_dir: ./outputs/orthrus_baseline_yandex_v1
prompt_file: prompts/smoke_prompts_no_think.jsonl

model:
  name_or_path: /models/Orthrus-Qwen3-1.7B
  tokenizer_name_or_path: /models/Orthrus-Qwen3-1.7B
  dtype: bfloat16
  device_map: auto
  attn_implementation: null
  trust_remote_code: true

generation:
  max_new_tokens: 64
  batch_size: 1
  do_sample: false
  temperature: null
  top_p: null
  seed: 20260705
  warmup_runs: 1
  benchmark_runs: 3
  eos_token_id: null
  pad_token_id: null
  use_chat_template: true
  system_prompt: null

modes:
  - name: ar_baseline
    kind: autoregressive
    kwargs: {}
  - name: orthrus_official
    kind: orthrus
    kwargs: {}
